name: Bug report
description: Something isn't working
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the fields below — issues
        without a reproducer will be closed.
  - type: input
    id: version
    attributes:
      label: cra-scope version
      description: Output of `cra-scope --version`
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Exact command(s) or Python snippet. Redact any secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Full output / traceback
      render: shell
